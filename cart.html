<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — Pharmron Natriceuticals</title>
    <meta name="description" content="Your shopping cart at Pharmron Natriceuticals.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 50: '#fdf8e8', 100: '#f9edc5', 200: '#f3db8a', 300: '#edc94f', 400: '#e0b832', 500: '#d4af37', 600: '#b8962a', 700: '#96741f', 800: '#755a18', 900: '#5c4713' },
                        'gold': '#d4af37', 'gold-light': '#f3db8a', 'gold-dark': '#96741f',
                        obsidian: { 50: '#f5f5f5', 100: '#e6e6e6', 200: '#cccccc', 300: '#a3a3a3', 400: '#808080', 500: '#666666', 600: '#4d4d4d', 700: '#333333', 800: '#1a1a1a', 900: '#0d0d0d', 950: '#050505' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-obsidian-950 text-obsidian-100 antialiased">

    <!-- ===== HEADER / NAV (identical to index.html) ===== -->
    <header class="sticky top-0 z-50 border-b border-gold/20 bg-obsidian-950/95 backdrop-blur-sm">
        <div class="mx-auto max-w-7xl px-4 py-3 sm:px-6 lg:px-8">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <a href="/" class="flex items-center gap-3">
                    <img src="/images/pharmronlogo.png" alt="Pharmron" class="h-[102px] w-auto sm:h-32">
                    <div>
                        <p class="text-[40px] font-semibold uppercase tracking-[0.3em] text-gold">Pharmron</p>
                        <p class="text-[30px] uppercase tracking-[0.4em] text-obsidian-400">Natriceuticals</p>
                    </div>
                </a>
                <nav>
                    <ul class="flex flex-wrap items-center gap-4 text-sm font-semibold text-obsidian-300">
                        <li><a href="/" class="transition hover:text-gold">Home</a></li>
                        <li><a href="/#products" class="transition hover:text-gold">Products</a></li>
                        <li><a href="/about.html" class="transition hover:text-gold">About</a></li>
                        <li><a href="/legal/privacy-policy.html" class="transition hover:text-gold hidden sm:inline">Privacy</a></li>
                        <li><a href="/legal/terms-of-service.html" class="transition hover:text-gold hidden sm:inline">Terms</a></li>
                        <li><a href="/cart.html" class="rounded-full border border-gold/30 bg-gold/10 px-4 py-2 text-gold transition hover:bg-gold/20">Cart</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="bg-obsidian-950 py-8 sm:py-8 lg:py-14">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="mb-10 sm:mb-12">
                    <p class="text-xs font-semibold uppercase tracking-[0.25em] text-gold/60">Your Cart</p>
                    <h2 class="mt-3 text-3xl font-black tracking-tight text-white sm:text-4xl lg:text-5xl">Shopping Cart</h2>
                </div>

                <div id="cart-page">
                    <!-- Dynamically populated by script.js -->
                    <div class="flex items-center justify-center py-20">
                        <div class="flex items-center gap-3 text-obsidian-400">
                            <svg class="h-6 w-6 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                            <span>Loading cart...</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== FOOTER ===== -->
        <footer class="border-t border-gold/10 bg-obsidian-950">
        <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
            <div class="grid gap-8 md:grid-cols-[1.4fr_1fr] lg:grid-cols-[1.5fr_1fr]">
                <div class="space-y-4 text-center md:text-left">
                    <p class="text-sm text-obsidian-500">&copy; 2026 Pharmron Natriceuticals. All rights reserved.</p>
                    <p class="text-sm text-obsidian-400">Follow us on social media</p>
                    <div class="flex flex-wrap justify-center gap-3 text-sm text-obsidian-300 md:justify-start">
                        <a href="https://instagram.com/YOUR_INSTAGRAM_HANDLE" class="transition hover:text-gold" target="_blank" rel="noopener">Instagram</a>
                        <a href="https://facebook.com/YOUR_FACEBOOK_PAGE" class="transition hover:text-gold" target="_blank" rel="noopener">Facebook</a>
                        <a href="https://twitter.com/YOUR_TWITTER_HANDLE" class="transition hover:text-gold" target="_blank" rel="noopener">Twitter</a>
                    </div>
                </div>
                <div class="flex flex-wrap items-center justify-center gap-4 text-sm text-obsidian-500 md:justify-end">
                    <a href="/" class="transition hover:text-gold">Home</a>
                    <a href="/#products" class="transition hover:text-gold">Products</a>
                    <a href="/about.html" class="transition hover:text-gold">About</a>
                    <a href="/contact.html" class="transition hover:text-gold">Contact</a>
                    <a href="/legal/privacy-policy.html" class="transition hover:text-gold">Privacy</a>
                    <a href="/legal/terms-of-service.html" class="transition hover:text-gold">Terms</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
